# ---------------------------------------------------------------------------
# Datasource - Quarkus Dev Services starts PostgreSQL automatically
# ---------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.port=5432
quarkus.datasource.devservices.db-name=audit_demo
quarkus.datasource.devservices.username=audit_demo
quarkus.datasource.devservices.password=audit_demo

# ---------------------------------------------------------------------------
# Flyway - run migrations on startup
# ---------------------------------------------------------------------------
quarkus.flyway.migrate-at-start=true

# ---------------------------------------------------------------------------
# Hibernate - Flyway owns the schema, Hibernate only validates it
# ---------------------------------------------------------------------------
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.sql=false

# ---------------------------------------------------------------------------
# OpenAPI / Swagger UI
# ---------------------------------------------------------------------------
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Quarkus Panache Audit Trigger Demo API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Reference implementation for transparent audit columns with Quarkus, Panache bulk updates and PostgreSQL triggers.
